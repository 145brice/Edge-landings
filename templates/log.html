<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Recovered run log</title><style>:root{--bg:#0b1020;--card:#141b2d;--line:#29334d;--accent:#6ee7b7;--text:#edf2f7;--muted:#9aa7bd}*{box-sizing:border-box}body{background:var(--bg);color:var(--text);font:15px system-ui;margin:0}.app-tabs{display:flex;gap:8px;padding:14px max(20px,calc((100vw - 1000px)/2));border-bottom:1px solid var(--line)}.app-tabs a{color:var(--muted);text-decoration:none;padding:9px 15px;border:1px solid var(--line);border-radius:9px}.app-tabs a:hover{background:var(--accent);color:#062218}main{max-width:1000px;margin:auto;padding:30px}pre{background:var(--card);border:1px solid var(--line);padding:20px;border-radius:12px;white-space:pre-wrap}.status{color:var(--accent)}</style></head><body>{% include '_nav.html' %}<main><h1>Most recent recovered log</h1><p>{{filename}} · <strong class="status">{{status}}</strong></p><pre>{{content}}</pre></main></body></html>
