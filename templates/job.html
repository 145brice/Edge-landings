<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Scraper run</title>
<style>:root{--bg:#0b1020;--card:#141b2d;--line:#29334d;--accent:#6ee7b7;--text:#edf2f7;--muted:#9aa7bd}*{box-sizing:border-box}body{background:var(--bg);color:var(--text);font:15px system-ui;margin:0}.app-tabs{position:sticky;top:0;z-index:20;display:flex;gap:8px;overflow-x:auto;background:rgba(11,16,32,.96);border-bottom:1px solid var(--line);padding:14px max(20px,calc((100vw - 1000px)/2));backdrop-filter:blur(10px)}.app-tabs a{color:var(--muted);text-decoration:none;padding:9px 15px;border:1px solid var(--line);border-radius:9px;white-space:nowrap}.app-tabs a:hover,.app-tabs a.active{color:#062218;background:var(--accent);border-color:var(--accent)}main{max-width:1000px;margin:auto;padding:30px}a{color:var(--accent)}pre{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:20px;white-space:pre-wrap;min-height:300px}.pill{color:var(--accent)}button{background:#ef4444;color:white;border:0;border-radius:7px;padding:9px 14px;cursor:pointer}</style></head>
<body>{% include '_nav.html' %}<main><h1>{{job.niche}} in {{job.location}}</h1><p>Status: <strong class="pill" id="status">{{job.status}}</strong></p><form id="stop-form" method="post" action="/jobs/{{job.id}}/stop"><button>Stop this scan</button></form><pre id="log">{{job.log or 'Starting...'}}</pre><p id="results"></p></main><script>const id={{job.id|tojson}};async function poll(){const r=await fetch('/api/jobs/'+id),j=await r.json();document.querySelector('#status').textContent=j.status;document.querySelector('#log').textContent=j.log||'Starting...';if(j.status==='completed'){document.querySelector('#stop-form').hidden=true;document.querySelector('#results').innerHTML='<a href="/?file='+encodeURIComponent(j.output)+'#results">View results &rarr;</a>';return}if(['failed','stopped'].includes(j.status)){document.querySelector('#stop-form').hidden=true;return}setTimeout(poll,1500)}poll()</script></body></html>
